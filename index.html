<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>G-Trade | Risk Calculator</title>
    <!-- ИКОНКИ -->
    <link rel="icon" type="image/png" sizes="32x32" href="icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <h1>G-Trade</h1>
            <p>Risk Manager • 1% Rule</p>
        </header>

        <!-- Toggle панелей -->
        <div class="toggle-group">
            <button id="forexModeBtn" class="mode-pill active">📈 FOREX</button>
            <button id="cryptoModeBtn" class="mode-pill">₿ CRYPTO</button>
        </div>

        <!-- ПАНЕЛЬ ФОРЕКС (в разработке / закрыта) -->
        <section id="forexPanel" class="calculator-card">
            <div class="card-badge">🔧 In Development</div>
            <div class="input-group">
                <label>Balance (USD)</label>
                <input type="number" id="forexBalance" placeholder="10 000" disabled>
            </div>
            <div class="input-group">
                <label>Entry Price</label>
                <input type="number" id="forexEntry" placeholder="1.1050" disabled>
            </div>
            <div class="input-group">
                <label>Stop Loss</label>
                <input type="number" id="forexStop" placeholder="1.1020" disabled>
            </div>
            <div class="input-group">
                <label>Step (points)</label>
                <input type="number" id="forexStep" placeholder="0.0001" disabled>
            </div>
            <div class="input-group">
                <label>Price Step ($)</label>
                <input type="number" id="forexPriceStep" placeholder="1" disabled>
            </div>
            <button id="forexCalcBtn" class="calc-btn disabled-btn" disabled>🚧 Рассчитать</button>
            <div id="forexResultBox" class="result-box">—</div>
            <div class="dev-note">⚡ Полноценная версия FOREX выйдет в обновлении</div>
        </section>

        <!-- ПАНЕЛЬ КРИПТА (активная) -->
        <section id="cryptoPanel" class="calculator-card hidden">
            <div class="card-badge">🔥 LIVE DATA • BINANCE</div>
            <div class="input-group">
                <label>Торговая пара</label>
                <input type="text" id="cryptoSymbol" placeholder="BTCUSDT, ETHUSDT, SOLUSDT" value="BTCUSDT">
            </div>
            <div class="input-group">
                <label>Баланс (USDT)</label>
                <input type="number" id="cryptoBalance" placeholder="Ваш депозит" value="1000">
            </div>
            <div class="input-group">
                <label>Stop Loss Price (USDT)</label>
                <input type="number" id="cryptoStopLoss" placeholder="Цена стоп-лосса" step="any">
                <div class="hint">Цена актива, при которой сработает стоп</div>
            </div>
            <div class="live-price-row">
                <span>💰 Текущая цена:</span>
                <span id="livePriceDisplay">—</span>
                <button id="refreshPriceBtn" class="small-refresh">⟳</button>
            </div>
            <button id="cryptoCalcBtn" class="calc-btn">📐 Рассчитать объём</button>
            <div id="cryptoResultBox" class="result-box"></div>
            <div class="risk-info">⚡ Риск = 1% от депозита • Расчёт: (Баланс × 0.01) / |Entry − Stop|</div>
        </section>
    </div>

    <footer>
        <h3>Product by Academy Kings</h3>
        <p>Developer <a href="https://t.me/AV0_0AV" target="_blank" style="color: #8a9bb5; text-decoration: none;">AVA</a></p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
